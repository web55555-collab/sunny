<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>위탁관리업체 점검 관리 시스템</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f0; --surface: #ffffff; --border: #e0e0d8;
    --text: #1a1a1a; --muted: #666; --accent: #185FA5;
    --ok: #3B6D11; --ok-bg: #EAF3DE;
    --warn: #854F0B; --warn-bg: #FAEEDA;
    --bad: #A32D2D; --bad-bg: #FCEBEB;
    --purple: #3C3489; --purple-bg: #EEEDFE;
  }
  body { font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
  .app { max-width: 900px; margin: 0 auto; padding: 16px; }
  .top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  h1 { font-size: 18px; font-weight: 600; }
  .today-label { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 16px; }
  .sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .sum-label { font-size: 11px; color: var(--muted); }
  .sum-val { font-size: 24px; font-weight: 600; margin-top: 2px; }
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 16px; overflow-x: auto; }
  .tab { padding: 8px 14px; font-size: 13px; cursor: pointer; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); white-space: nowrap; }
  .tab.active { color: var(--text); border-bottom: 2px solid var(--text); font-weight: 500; }
  .section { display: none; }
  .section.visible { display: block; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; margin-bottom: 10px; }
  label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 3px; }
  input, select, textarea { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; background: #fff; color: var(--text); }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { height: 70px; resize: vertical; }
  .btn { padding: 7px 16px; border-radius: 7px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; transition: background .15s; }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #0C447C; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .btn-del { background: var(--bad-bg); color: var(--bad); border-color: #F09595; }
  .flex-end { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }
  .tag-ok { background: var(--ok-bg); color: var(--ok); }
  .tag-warn { background: var(--warn-bg); color: var(--warn); }
  .tag-bad { background: var(--bad-bg); color: var(--bad); }
  .tag-purple { background: var(--purple-bg); color: var(--purple); }
  .tag-blue { background: #E6F1FB; color: #185FA5; }
  .week-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .week-label { flex: 1; text-align: center; font-size: 14px; font-weight: 500; }
  .week-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; margin-bottom: 14px; }
  .day-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 6px; text-align: center; cursor: pointer; }
  .day-cell.selected { border: 2px solid var(--accent); background: #E6F1FB; }
  .day-cell.today .day-label { color: var(--accent); }
  .day-count { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .row-item { border-bottom: 1px solid var(--border); padding: 10px 0; }
  .row-item:last-child { border-bottom: none; }
  .row-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .row-note { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .empty { text-align: center; padding: 2rem; color: var(--muted); }
  .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-bar select, .filter-bar input { width: auto; min-width: 110px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
  @media (max-width: 600px) {
    .summary-grid { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div>
      <h1>위탁관리업체 점검 관리</h1>
      <div class="today-label" id="todayLabel"></div>
    </div>
    <div style="display:flex;gap:8px;">
      <a href="/api/export/csv" class="btn">📥 CSV 내보내기</a>
    </div>
  </div>

  <div class="summary-grid" id="summaryGrid">
    <div class="sum-card"><div class="sum-label">이번달 점검</div><div class="sum-val" id="s1">-</div></div>
    <div class="sum-card"><div class="sum-label">정상</div><div class="sum-val" id="s2" style="color:var(--ok)">-</div></div>
    <div class="sum-card"><div class="sum-label">주의/불량</div><div class="sum-val" id="s3" style="color:var(--bad)">-</div></div>
    <div class="sum-card"><div class="sum-label">특별점검 미완료</div><div class="sum-val" id="s4" style="color:var(--warn)">-</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('weekly')">📅 주간 순환 점검</button>
    <button class="tab" onclick="switchTab('special')">⭐ 특별 점검</button>
    <button class="tab" onclick="switchTab('vendors')">🏢 업체 관리</button>
    <button class="tab" onclick="switchTab('history')">📋 전체 이력</button>
  </div>

  <!-- 주간 순환 점검 -->
  <div class="section visible" id="tab-weekly">
    <div class="week-nav">
      <button class="btn" onclick="changeWeek(-1)">◀</button>
      <div class="week-label" id="weekLabel"></div>
      <button class="btn" onclick="changeWeek(1)">▶</button>
      <button class="btn" onclick="goToday()">오늘</button>
    </div>
    <div class="week-grid" id="weekGrid"></div>
    <div class="card" id="dayCard">
      <div class="card-title" id="dayTitle">날짜를 선택하세요</div>
      <div id="dayContent"><div class="empty">요일을 클릭하면 해당일 점검 내용을 확인합니다.</div></div>
    </div>
    <div class="card">
      <div class="card-title">점검 기록 추가</div>
      <div class="form-row">
        <div><label>점검 날짜</label><input type="date" id="i_date"></div>
        <div><label>업체명</label><select id="i_vendor"><option value="">-- 선택 --</option></select></div>
        <div><label>필요 개선사항</label><input type="text" id="i_area" placeholder="개선이 필요한 사항"></div>
        <div><label>점검자</label><input type="text" id="i_inspector" placeholder="이름"></div>
      </div>
      <div class="form-row">
        <div><label>이전 개선내역</label><input type="text" id="i_items" placeholder="이전에 개선된 내역"></div>
        <div><label>점검 결과</label>
          <select id="i_result">
            <option>정상</option><option>주의</option><option>불량</option>
          </select>
        </div>
      </div>
      <div><label>특이사항</label><textarea id="i_note" placeholder="점검 중 발견된 특이사항"></textarea></div>
      <div class="flex-end"><button class="btn btn-primary" onclick="addRecord()">점검 기록 저장</button></div>
    </div>
  </div>

  <!-- 특별 점검 -->
  <div class="section" id="tab-special">
    <div class="card">
      <div class="card-title">특별 점검 등록</div>
      <div class="form-row">
        <div><label>점검 날짜</label><input type="date" id="s_date"></div>
        <div><label>점검 제목</label><input type="text" id="s_title" placeholder="예: 소방설비 점검"></div>
        <div><label>담당 업체</label><select id="s_vendor"><option value="">-- 선택 --</option></select></div>
        <div><label>점검 유형</label>
          <select id="s_type">
            <option>안전점검</option><option>소방점검</option><option>위생점검</option><option>전기점검</option><option>기타</option>
          </select>
        </div>
      </div>
      <div><label>주요 점검 사항</label><textarea id="s_content" placeholder="특별 점검의 주요 사항을 상세히 입력하세요"></textarea></div>
      <div class="form-row">
        <div><label>처리 상태</label>
          <select id="s_status"><option>미완료</option><option>진행중</option><option>완료</option></select>
        </div>
        <div><label>다음 점검 예정일</label><input type="date" id="s_next"></div>
      </div>
      <div class="flex-end"><button class="btn btn-primary" onclick="addSpecial()">특별 점검 저장</button></div>
    </div>
    <div id="specialList"></div>
  </div>

  <!-- 업체 관리 -->
  <div class="section" id="tab-vendors">
    <div class="card">
      <div class="card-title">업체 등록</div>
      <div class="form-row">
        <div><label>업체명 *</label><input type="text" id="v_name" placeholder="업체명"></div>
        <div><label>담당 구역</label><input type="text" id="v_area" placeholder="예: 건물 전체"></div>
        <div><label>담당자</label><input type="text" id="v_contact" placeholder="담당자 이름"></div>
        <div><label>연락처</label><input type="text" id="v_phone" placeholder="010-0000-0000"></div>
      </div>
      <div class="form-row">
        <div><label>점검 주기</label>
          <select id="v_cycle"><option>매일</option><option>주 1회</option><option>주 2회</option><option>월 1회</option></select>
        </div>
        <div><label>담당 요일</label>
          <select id="v_day"><option value="월">월요일</option><option value="화">화요일</option><option value="수">수요일</option><option value="목">목요일</option><option value="금">금요일</option><option value="전체">전체</option></select>
        </div>
        <div><label>업체 유형</label>
          <select id="v_type"><option>청소</option><option>보안</option><option>시설관리</option><option>조경</option><option>기타</option></select>
        </div>
      </div>
      <div class="flex-end"><button class="btn btn-primary" onclick="addVendor()">업체 등록</button></div>
    </div>
    <div id="vendorList"></div>
  </div>

  <!-- 전체 이력 -->
  <div class="section" id="tab-history">
    <div class="filter-bar">
      <select id="f_vendor" onchange="loadHistory()"><option value="">전체 업체</option></select>
      <select id="f_result" onchange="loadHistory()">
        <option value="">전체 결과</option><option>정상</option><option>주의</option><option>불량</option>
      </select>
      <input type="month" id="f_month" onchange="loadHistory()" style="min-width:130px;">
      <button class="btn" onclick="clearFilter()">초기화</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "";
let weekOffset = 0;
let selectedDate = null;
let vendors = [];

const today = () => new Date().toISOString().slice(0,10);

function fmt(ds) {
  if (!ds) return "";
  const [y,m,d] = ds.split("-");
  return `${y}.${m}.${d}`;
}

function getMonday(offset) {
  const d = new Date();
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1 + offset * 7);
  d.setHours(0,0,0,0);
  return d;
}

async function api(path, method="GET", body=null) {
  const opts = { method, headers: {"Content-Type":"application/json"} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  return r.json();
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2000);
}

function switchTab(name) {
  document.querySelectorAll(".tab").forEach((t,i) => {
    t.classList.toggle("active", ["weekly","special","vendors","history"][i] === name);
  });
  document.querySelectorAll(".section").forEach(s => s.classList.remove("visible"));
  document.getElementById("tab-"+name).classList.add("visible");
  if (name === "history") loadHistory();
}

async function loadSummary() {
  const d = await api("/api/summary");
  document.getElementById("s1").textContent = d.total;
  document.getElementById("s2").textContent = d.normal;
  document.getElementById("s3").textContent = d.warn_bad;
  document.getElementById("s4").textContent = d.pending_special;
}

async function loadVendors() {
  vendors = await api("/api/vendors");
  const ids = ["i_vendor","s_vendor","f_vendor"];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const cur = el.value;
    const isFilter = id === "f_vendor";
    el.innerHTML = isFilter ? '<option value="">전체 업체</option>' : '<option value="">-- 선택 --</option>';
    vendors.forEach(v => {
      el.innerHTML += `<option value="${v.name}">${v.name} (${v.type})</option>`;
    });
    el.value = cur;
  });
  renderVendorList();
}

function renderVendorList() {
  const el = document.getElementById("vendorList");
  if (!vendors.length) { el.innerHTML = '<div class="empty">등록된 업체가 없습니다.</div>'; return; }
  el.innerHTML = vendors.map(v => `
    <div class="card" style="display:flex;justify-content:space-between;align-items:start;gap:12px;">
      <div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:4px;">
          <strong>${v.name}</strong>
          <span class="tag tag-purple">${v.type}</span>
          <span class="tag tag-blue">${v.day}요일 / ${v.cycle}</span>
        </div>
        <div class="row-meta">구역: ${v.area||"-"} | 담당: ${v.contact||"-"} | ${v.phone||"-"}</div>
      </div>
      <button class="btn btn-sm btn-del" onclick="delVendor(${v.id})">삭제</button>
    </div>`).join("");
}

async function addVendor() {
  const name = document.getElementById("v_name").value.trim();
  if (!name) { toast("업체명을 입력하세요."); return; }
  const r = await api("/api/vendors","POST",{
    name, area: document.getElementById("v_area").value,
    contact: document.getElementById("v_contact").value,
    phone: document.getElementById("v_phone").value,
    cycle: document.getElementById("v_cycle").value,
    day: document.getElementById("v_day").value,
    type: document.getElementById("v_type").value,
  });
  if (!r.ok) { toast(r.error||"오류"); return; }
  toast("업체가 등록되었습니다.");
  document.getElementById("v_name").value = "";
  document.getElementById("v_area").value = "";
  document.getElementById("v_contact").value = "";
  document.getElementById("v_phone").value = "";
  loadVendors();
}

async function delVendor(id) {
  if (!confirm("삭제하시겠습니까?")) return;
  await api(`/api/vendors/${id}`,"DELETE");
  toast("삭제되었습니다."); loadVendors();
}

async function renderWeek() {
  const mon = getMonday(weekOffset);
  const fri = new Date(mon); fri.setDate(mon.getDate()+4);
  document.getElementById("weekLabel").textContent = `${fmt(mon.toISOString().slice(0,10))} ~ ${fmt(fri.toISOString().slice(0,10))}`;
  const days = ["월","화","수","목","금"];
  const todayStr = today();
  const monStr = mon.toISOString().slice(0,10);
  const records = await api(`/api/records?month=${monStr.slice(0,7)}`);
  let html = "";
  for (let i = 0; i < 5; i++) {
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    const ds = d.toISOString().slice(0,10);
    const cnt = records.filter(r => r.date === ds).length;
    const isSel = selectedDate === ds;
    const isToday = ds === todayStr;
    html += `<div class="day-cell${isSel?" selected":""}${isToday?" today":""}" onclick="selectDay('${ds}')">
      <div class="day-label" style="font-weight:500">${days[i]}</div>
      <div class="day-count">${d.getMonth()+1}/${d.getDate()}</div>
      ${cnt > 0 ? `<div class="day-count" style="color:var(--ok)">${cnt}건</div>` : ""}
    </div>`;
  }
  document.getElementById("weekGrid").innerHTML = html;
  if (selectedDate) loadDayDetail(selectedDate);
}

async function loadDayDetail(ds) {
  const [y,m,d] = ds.split("-");
  const dows = ["일","월","화","수","목","금","토"];
  const dow = dows[new Date(ds).getDay()];
  document.getElementById("dayTitle").textContent = `${y}년 ${m}월 ${d}일 (${dow}) 점검 현황`;
  const recs = await api(`/api/records?date=${ds}`);
  if (!recs.length) {
    document.getElementById("dayContent").innerHTML = '<div class="empty">이 날의 점검 기록이 없습니다.</div>';
    return;
  }
  document.getElementById("dayContent").innerHTML = recs.map(r => {
    const tc = r.result==="정상"?"tag-ok":r.result==="주의"?"tag-warn":"tag-bad";
    return `<div class="row-item">
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:3px;">
        <strong>${r.vendor||"업체미지정"}</strong>
        <span class="tag ${tc}">${r.result}</span>
        ${r.area?`<span class="tag tag-blue">${r.area}</span>`:""}
      </div>
      <div class="row-meta">점검자: ${r.inspector||"-"} | 이전 개선내역: ${r.items||"-"}</div>
      ${r.note?`<div class="row-note">특이사항: ${r.note}</div>`:""}
      <div class="flex-end" style="margin-top:6px"><button class="btn btn-sm btn-del" onclick="delRecord(${r.id})">삭제</button></div>
    </div>`;
  }).join("");
}

function selectDay(ds) {
  selectedDate = ds;
  document.getElementById("i_date").value = ds;
  renderWeek();
}

function changeWeek(dir) { weekOffset += dir; renderWeek(); }
function goToday() { weekOffset = 0; selectedDate = today(); renderWeek(); }

async function addRecord() {
  const date = document.getElementById("i_date").value;
  if (!date) { toast("날짜를 선택하세요."); return; }
  await api("/api/records","POST",{
    date, vendor: document.getElementById("i_vendor").value,
    area: document.getElementById("i_area").value,
    inspector: document.getElementById("i_inspector").value,
    items: document.getElementById("i_items").value,
    result: document.getElementById("i_result").value,
    note: document.getElementById("i_note").value,
  });
  toast("점검 기록이 저장되었습니다.");
  document.getElementById("i_area").value = "";
  document.getElementById("i_note").value = "";
  selectedDate = date;
  renderWeek(); loadSummary();
}

async function delRecord(id) {
  if (!confirm("삭제하시겠습니까?")) return;
  await api(`/api/records/${id}`,"DELETE");
  toast("삭제되었습니다."); renderWeek(); loadSummary();
}

async function loadSpecials() {
  const list = await api("/api/specials");
  const el = document.getElementById("specialList");
  if (!list.length) { el.innerHTML = '<div class="empty">등록된 특별 점검이 없습니다.</div>'; return; }
  el.innerHTML = list.map(s => {
    const sc = s.status==="완료"?"tag-ok":s.status==="진행중"?"tag-warn":"tag-bad";
    return `<div class="card">
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:4px;">
        <strong>${s.title}</strong>
        <span class="tag tag-purple">${s.type}</span>
        <span class="tag ${sc}">${s.status}</span>
      </div>
      <div class="row-meta">${fmt(s.date)} | ${s.vendor||"업체미지정"}</div>
      ${s.content?`<div class="row-note" style="margin-top:6px">${s.content}</div>`:""}
      ${s.next_date?`<div class="row-meta" style="margin-top:4px">다음 점검 예정: ${fmt(s.next_date)}</div>`:""}
      <div class="flex-end" style="margin-top:8px;gap:6px;">
        <select style="font-size:12px;width:auto;padding:4px 8px;" onchange="updateSpecial(${s.id},this.value)">
          <option${s.status==="미완료"?" selected":""}>미완료</option>
          <option${s.status==="진행중"?" selected":""}>진행중</option>
          <option${s.status==="완료"?" selected":""}>완료</option>
        </select>
        <button class="btn btn-sm btn-del" onclick="delSpecial(${s.id})">삭제</button>
      </div>
    </div>`;
  }).join("");
}

async function addSpecial() {
  const date = document.getElementById("s_date").value;
  const title = document.getElementById("s_title").value;
  if (!date||!title) { toast("날짜와 제목을 입력하세요."); return; }
  await api("/api/specials","POST",{
    date, title, vendor: document.getElementById("s_vendor").value,
    type: document.getElementById("s_type").value,
    content: document.getElementById("s_content").value,
    status: document.getElementById("s_status").value,
    next_date: document.getElementById("s_next").value,
  });
  toast("특별 점검이 등록되었습니다.");
  document.getElementById("s_title").value = "";
  document.getElementById("s_content").value = "";
  document.getElementById("s_next").value = "";
  loadSpecials(); loadSummary();
}

async function updateSpecial(id, status) {
  await api(`/api/specials/${id}`,"PATCH",{status});
  loadSpecials(); loadSummary();
}

async function delSpecial(id) {
  if (!confirm("삭제하시겠습니까?")) return;
  await api(`/api/specials/${id}`,"DELETE");
  toast("삭제되었습니다."); loadSpecials(); loadSummary();
}

async function loadHistory() {
  const vendor = document.getElementById("f_vendor").value;
  const result = document.getElementById("f_result").value;
  const month  = document.getElementById("f_month").value;
  let qs = [];
  if (vendor) qs.push(`vendor=${encodeURIComponent(vendor)}`);
  if (result) qs.push(`result=${encodeURIComponent(result)}`);
  if (month)  qs.push(`month=${month}`);
  const list = await api("/api/records?" + qs.join("&"));
  const el = document.getElementById("historyList");
  if (!list.length) { el.innerHTML = '<div class="empty">조건에 맞는 기록이 없습니다.</div>'; return; }
  el.innerHTML = list.map(r => {
    const tc = r.result==="정상"?"tag-ok":r.result==="주의"?"tag-warn":"tag-bad";
    return `<div class="card" style="padding:12px 16px;margin-bottom:8px;">
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:3px;">
        <span style="font-weight:500">${fmt(r.date)}</span>
        <span>${r.vendor||"업체미지정"}</span>
        <span class="tag ${tc}">${r.result}</span>
        ${r.area?`<span class="tag tag-blue">${r.area}</span>`:""}
      </div>
      <div class="row-meta">점검자: ${r.inspector||"-"} | 이전 개선내역: ${r.items||"-"}</div>
      ${r.note?`<div class="row-note">특이사항: ${r.note}</div>`:""}
    </div>`;
  }).join("");
}

function clearFilter() {
  document.getElementById("f_vendor").value = "";
  document.getElementById("f_result").value = "";
  document.getElementById("f_month").value = "";
  loadHistory();
}

async function init() {
  document.getElementById("todayLabel").textContent = `오늘: ${fmt(today())}`;
  document.getElementById("i_date").value = today();
  document.getElementById("s_date").value = today();
  selectedDate = today();
  await loadVendors();
  await loadSummary();
  await renderWeek();
  await loadSpecials();
}

init();
</script>
</body>
</html>
